<!DOCTYPE html>
<html>
<head>
    <title>Test Analytics API with Auth</title>
</head>
<body>
    <h1>Testing Analytics API with Authentication</h1>
    <button onclick="testAnalytics()">Test Analytics API</button>
    <div id="result"></div>
    
    <script>
    async function testAnalytics() {
        try {
            // This will use the browser's auth cookies if the user is logged in
            const response = await fetch('http://localhost:3005/api/items/analytics?storeId=182584b6-1b7d-4168-b68c-29acab85f764&period=30d&sortBy=revenue&sortOrder=desc&limit=100', {
                method: 'GET',
                credentials: 'include', // Include cookies for authentication
                headers: {
                    'Content-Type': 'application/json'
                }
            });
            
            const data = await response.json();
            
            if (response.ok) {
                document.getElementById('result').innerHTML = `
                    <h3>Success! Response:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } else {
                document.getElementById('result').innerHTML = `
                    <h3>Error ${response.status}:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            }
        } catch (error) {
            document.getElementById('result').innerHTML = 'Error: ' + error.message;
        }
    }
    </script>
</body>
</html>
