# Default Railway config-as-code for the primary API service.
# For web + River cron, point each Railway service at the matching file under infra/railway/
# (see RAILWAY_DEPLOYMENT.md).

[build]
builder = "NIXPACKS"
# Match web service: production install skips devDependencies (Prisma CLI lived there). Install+generate
# with NODE_ENV=development; compile server with NODE_ENV=production. CI=true avoids pnpm prompts.
buildCommand = "export NODE_ENV=development CI=true && pnpm install --frozen-lockfile && pnpm db:generate && pnpm --filter @packages/db build && pnpm --filter @packages/domain build && pnpm --filter @packages/realtime build && pnpm --filter @packages/schemas build && NODE_ENV=production pnpm --filter @apps/server build"

[deploy]
startCommand = "pnpm --filter @apps/server start"
healthcheckPath = "/healthz"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
