# Static Vite preview. In Railway: set "Config as code" path to /infra/railway/web.toml
# Root directory: repository root.

[build]
builder = "NIXPACKS"
# Railway/Nixpacks sets NODE_ENV=production so pnpm skips devDependencies. `env VAR= cmd` only applies
# to that one command — later `pnpm gen:sdk` still saw production. Export for install+gen+package builds;
# restore production for the Vite app build. CI=true avoids interactive "reinstall from scratch?" prompts.
buildCommand = "export NODE_ENV=development CI=true && pnpm install --frozen-lockfile && pnpm gen:sdk && pnpm --filter @packages/realtime build && pnpm --filter @packages/sdk build && NODE_ENV=production pnpm --filter @apps/web build"

[deploy]
startCommand = "pnpm --filter @apps/web exec vite preview --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
